<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MoonShotForge — Solana Trading Bot</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Segoe UI',sans-serif;background:#0a0a0f;color:#e2e8f0}
  .hero{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:40px 20px;background:radial-gradient(ellipse at center,#1a0a2e 0%,#0a0a0f 70%)}
  h1{font-size:3rem;background:linear-gradient(90deg,#22c55e,#3b82f6,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:1rem}
  .tagline{font-size:1.3rem;color:#94a3b8;margin-bottom:2rem;max-width:600px}
  .cta{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap}
  .btn{padding:14px 32px;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;text-decoration:none;transition:all 0.3s}
  .btn-green{background:linear-gradient(90deg,#22c55e,#16a34a);color:#fff;border:none}
  .btn-outline{background:transparent;color:#22c55e;border:2px solid #22c55e}
  .btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(34,197,94,0.4)}
  .price{margin-top:3rem;font-size:2rem;color:#22c55e;font-weight:700}
  .price-sub{color:#94a3b8;font-size:0.9rem}
</style>
</head>
<body>
<div class="hero">
  <div>
    <div style="font-size:4rem;margin-bottom:1rem">🚀</div>
    <h1>MoonShotForge</h1>
    <p class="tagline">The most advanced Solana meme-coin signal bot. AI-powered. Multi-source. Self-learning.</p>
    <div class="cta">
      <a href="/" class="btn btn-green">🎯 Get Started</a>
      <a href="/wallet-connect.html" class="btn btn-outline">💼 Connect Wallet</a>
    </div>
    <div class="price">$49.99<span style="font-size:1rem">/month</span></div>
    <p class="price-sub">PayPal or SOL • Cancel anytime</p>
  </div>
</div>
</body>
</html>
